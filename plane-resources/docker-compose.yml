# 依赖仓库根目录 .env（非 apps/api/.env），须与 apps/api/.env 里 DATABASE_URL 等一致。
# 请勿在下方 plane-db 的 environment 里写 POSTGRES_*：Compose 会先展开 ${VAR:-默认}（通常读不到 ../.env），
# 再用展开结果覆盖 env_file，导致例如默认可成为 plane_password 而与根 .env 的 plane 不一致。
# 建议从仓库根目录执行：docker compose -f plane-resources/docker-compose.yml --env-file .env up -d
# （这样 RabbitMQ/MinIO 等仍使用 ${...} 时也会与根 .env 一致。）
#
# 若仍报 password authentication failed：多半是旧 pgdata 卷（曾用默认 plane_password 初始化）。
# Postgres 只在数据目录为空时读 POSTGRES_PASSWORD；有旧数据时改 .env 不会改库内密码。
# 清空并重建（会删库）：docker compose -f plane-resources/docker-compose.yml --env-file .env down -v
# 卷名可用 docker volume ls | grep pgdata 查看（常见 plane-resources_pgdata，不是 plane_pgdata）。
services:
  plane-db:
    container_name: plane-db
    image: postgres:15.7-alpine
    restart: always
    command: postgres -c 'max_connections=1000'
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - ../.env
    environment:
      PGDATA: /var/lib/postgresql/data
    networks:
      - plane
  plane-redis:
    container_name: plane-redis
    image: valkey/valkey:7.2.11-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - plane

  plane-mq:
    container_name: plane-mq
    image: rabbitmq:3.13.6-management-alpine
    restart: always
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    env_file:
      - ../.env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-plane}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-plane}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-plane}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - plane

  plane-minio:
    container_name: plane-minio
    image: minio/minio
    restart: always
    command: server /export --console-address ":9090"
    volumes:
      - uploads:/export
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-access-key}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-secret-key}
    ports:
      - "9000:9000"   # S3 API → http://localhost:9000
      - "9091:9090"   # Console → http://localhost:9091
    networks:
      - plane

networks:
  plane:
    external: true
    name: plane

volumes:
  pgdata:
  redisdata:
  uploads:
  rabbitmq_data:
