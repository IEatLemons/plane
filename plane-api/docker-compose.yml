services:
  api:
    container_name: api
    build:
      context: ../apps/api
      dockerfile: Dockerfile.api
      args:
        DOCKER_BUILDKIT: 1
    restart: always
    command: ./bin/docker-entrypoint-api.sh
    env_file:
      - ../apps/api/.env
    networks:
      - plane

  # 固定监听 3001，转发到 api:8000，避免 api 重启时 3001 时有时无
  api-gateway:
    container_name: api-gateway
    image: alpine/socat:latest
    restart: always
    command: TCP-LISTEN:3001,fork,reuseaddr TCP:api:8000
    ports:
      - "${API_PORT:-3001}:3001"
    networks:
      - plane
    depends_on:
      - api

  worker:
    container_name: bgworker
    build:
      context: ../apps/api
      dockerfile: Dockerfile.api
      args:
        DOCKER_BUILDKIT: 1
    restart: always
    command: ./bin/docker-entrypoint-worker.sh
    env_file:
      - ../apps/api/.env
    depends_on:
      - api
    networks:
      - plane

  beat-worker:
    container_name: beatworker
    build:
      context: ../apps/api
      dockerfile: Dockerfile.api
      args:
        DOCKER_BUILDKIT: 1
    restart: always
    command: ./bin/docker-entrypoint-beat.sh
    env_file:
      - ../apps/api/.env
    depends_on:
      - api
    networks:
      - plane

  migrator:
    container_name: plane-migrator
    build:
      context: ../apps/api
      dockerfile: Dockerfile.api
      args:
        DOCKER_BUILDKIT: 1
    restart: "no"
    command: ./bin/docker-entrypoint-migrator.sh
    env_file:
      - ../apps/api/.env
    networks:
      - plane

networks:
  plane:
    external: true
    name: plane
