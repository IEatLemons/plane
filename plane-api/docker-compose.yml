services:
  api:
    container_name: api
    build:
      context: ../apps/api
      dockerfile: Dockerfile.api
      args:
        DOCKER_BUILDKIT: 1
    restart: always
    command: ./bin/docker-entrypoint-api.sh
    env_file:
      - ../apps/api/.env
    depends_on:
      - plane-db
      - plane-redis
    networks:
      - plane

  worker:
    container_name: bgworker
    build:
      context: ../apps/api
      dockerfile: Dockerfile.api
      args:
        DOCKER_BUILDKIT: 1
    restart: always
    command: ./bin/docker-entrypoint-worker.sh
    env_file:
      - ../apps/api/.env
    depends_on:
      - api
      - plane-db
      - plane-redis
    networks:
      - plane

  beat-worker:
    container_name: beatworker
    build:
      context: ../apps/api
      dockerfile: Dockerfile.api
      args:
        DOCKER_BUILDKIT: 1
    restart: always
    command: ./bin/docker-entrypoint-beat.sh
    env_file:
      - ../apps/api/.env
    depends_on:
      - api
      - plane-db
      - plane-redis
    networks:
      - plane

  migrator:
    container_name: plane-migrator
    build:
      context: ../apps/api
      dockerfile: Dockerfile.api
      args:
        DOCKER_BUILDKIT: 1
    restart: "no"
    command: ./bin/docker-entrypoint-migrator.sh
    env_file:
      - ../apps/api/.env
    depends_on:
      - plane-db
      - plane-redis
    networks:
      - plane

  plane-db:
    image: postgres:15.7-alpine
    profiles: ["resources"]
    networks:
      - plane

  plane-redis:
    image: valkey/valkey:7.2.11-alpine
    profiles: ["resources"]
    networks:
      - plane

networks:
  plane:
    external: true
    name: plane
