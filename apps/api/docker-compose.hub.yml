# Hub / 自定义镜像：与同目录 `.env` 一起用时，Compose 会先在这里展开 `${VAR}`，
# 再通过 `environment` 覆盖 `env_file` 里未展开的 DATABASE_URL / REDIS_URL（docker run --env-file 不会做这件事）。
#
# 在 apps/api 目录执行：
#   docker compose -f docker-compose.hub.yml run --rm migrator
#   docker compose -f docker-compose.hub.yml up -d api
#
# 若在仓库根目录执行，需指定 project-directory（否则找不到用于展开的 .env）：
#   docker compose --project-directory apps/api -f apps/api/docker-compose.hub.yml run --rm migrator
#
# 可选：PLANE_API_IMAGE=你的镜像 PLANE_API_PUBLISH_PORT=8000 docker compose ...
#
# 若 DB/Redis 在名为 plane 的 Docker 网络上，可为本文件中的服务添加 networks: [plane]，并声明 external network plane。

services:
  migrator:
    image: ${PLANE_API_IMAGE:-ieatlemons/plane-api:latest}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      REDIS_URL: redis://${REDIS_USER}:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/
    command: ./bin/docker-entrypoint-migrator.sh

  api:
    image: ${PLANE_API_IMAGE:-ieatlemons/plane-api:latest}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      REDIS_URL: redis://${REDIS_USER}:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/
    ports:
      - "${PLANE_API_PUBLISH_PORT:-8000}:8000"
    command: ./bin/docker-entrypoint-api.sh
