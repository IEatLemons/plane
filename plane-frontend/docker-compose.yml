services:
  web:
    container_name: web
    build:
      context: ..
      dockerfile: ./apps/web/Dockerfile.web
      args:
        DOCKER_BUILDKIT: 1
    restart: always
    depends_on:
      - api
    networks:
      - plane

  admin:
    container_name: admin
    build:
      context: ..
      dockerfile: ./apps/admin/Dockerfile.admin
      args:
        DOCKER_BUILDKIT: 1
    restart: always
    depends_on:
      - api
      - web
    networks:
      - plane

  space:
    container_name: space
    build:
      context: ..
      dockerfile: ./apps/space/Dockerfile.space
      args:
        DOCKER_BUILDKIT: 1
    restart: always
    depends_on:
      - api
      - web
    networks:
      - plane

  live:
    container_name: plane-live
    build:
      context: ..
      dockerfile: ./apps/live/Dockerfile.live
      args:
        DOCKER_BUILDKIT: 1
    restart: always
    networks:
      - plane

  # 统一入口（本地/自托管用）；如果你已经有外部反代，可注释掉
  proxy:
    container_name: proxy
    build:
      context: ../apps/proxy
      dockerfile: Dockerfile.ce
    restart: always
    ports:
      - ${LISTEN_HTTP_PORT:-3000}:80
    env_file:
      - ../.env
    environment:
      FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
      BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
    depends_on:
      - web
      - api
      - space
      - admin
    networks:
      - plane

  api:
    image: alpine:3.20
    command: ["sh", "-lc", "echo 'api is external; start plane-api compose' && sleep 3600"]
    networks:
      - plane

networks:
  plane:
    external: true
    name: plane
